name: TypeScript

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: latest
          cache: npm
          cache-dependency-path: "TypeScript/package.json"

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm run test
        working-directory: TypeScript
