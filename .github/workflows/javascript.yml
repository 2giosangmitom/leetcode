name: JavaScript

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v29

      - name: Use flake devShell
        run: nix develop

      - name: Test
        run: make test_javascript
