name: typescript test

on: push

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - run: (cd TypeScript/ && deno fmt --check)
  lint:
    - run: (cd TypeScript/ && deno lint)
  test:
    - run: make testts
