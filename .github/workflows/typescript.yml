name: TypeScript

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: latest
          cache: pnpm
          working-directory: TypeScript

      - name: Install packages
        run: pnpm install
        working-directory: TypeScript

      - name: Test
        run: pnpm test
        working-directory: TypeScript
