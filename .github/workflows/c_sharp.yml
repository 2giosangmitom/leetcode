name: C#

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8

      - name: Restore dependencies
        run: dotnet restore
        working-directory: CSharp

      - name: Test
        run: dotnet test
        working-directory: CSharp
