name: C++

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@V28

      - name: Use flake devShell and run tests
        run: |
          nix develop --command sh -c "GTEST_PKG=\$GTEST_PKG make test_cpp"
