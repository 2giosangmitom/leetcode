name: Go

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: stable
          check-latest: true
        working-directory: Go

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
        working-directory: Go

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: stable
          check-latest: true
        working-directory: Go

      - name: Test
        run: go test ./... -cover
        working-directory: Go
