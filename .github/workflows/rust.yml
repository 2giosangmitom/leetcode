name: Rust

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Test
        run: cargo test --lib
        working-directory: Rust

  check:
    runs-on: ubuntu-latest

    step:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Check
        run: cargo clippy
        working-directory: Rust
