name: Java

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21
          cache: maven
          cache-dependency-path: "Java/pom.xml"

      - name: Test
        run: mvn test
        working-directory: Java
